<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Timer</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500&display=swap');

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0f;
                --panel: #10101a;
                --border: #1e1e2e;
                --accent: #00e5ff;
                --accent2: #ff4081;
                --text: #e0e0f0;
                --muted: #444466;
                --glow: 0 0 18px rgba(0, 229, 255, 0.35);
                --glow2: 0 0 18px rgba(255, 64, 129, 0.35);
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Rajdhani', sans-serif;
                overflow: hidden;
            }

            #timer-shell {
                position: relative;
                width: 320px;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 36px 32px 28px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
            }

            /* Corner accents */
            #timer-shell::before,
            #timer-shell::after {
                content: '';
                position: absolute;
                width: 16px;
                height: 16px;
                border-color: var(--accent);
                border-style: solid;
            }

            #timer-shell::before {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px;
            }

            #timer-shell::after {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0;
            }

            #label {
                font-weight: 300;
                font-size: 13px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #b0b0d0;
                margin-bottom: 20px;
                transition: color 0.4s;
            }

            #label.countdown-phase {
                color: var(--accent2);
            }

            #label.running-phase {
                color: var(--accent);
            }

            #display {
                font-family: 'Share Tech Mono', monospace;
                font-size: 64px;
                color: var(--text);
                letter-spacing: 2px;
                line-height: 1;
                margin-bottom: 8px;
                transition: color 0.4s, text-shadow 0.4s;
            }

            #display.countdown-phase {
                color: var(--accent2);
                text-shadow: var(--glow2);
            }

            #display.running-phase {
                color: var(--accent);
                text-shadow: var(--glow);
            }

            #display.running-phase.last-seconds {
                color: var(--accent2);
                text-shadow: var(--glow2);
            }

            #display.done-phase {
                color: #ffffff;
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
                animation: pulse-done 1s ease-in-out infinite;
            }

            @keyframes pulse-done {

                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0.6;
                }
            }

            #progress-bar-wrap {
                width: 100%;
                height: 2px;
                background: var(--border);
                margin: 20px 0 8px;
                position: relative;
                overflow: hidden;
            }

            #progress-bar {
                height: 100%;
                width: 0%;
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
                transition: background 0.4s, box-shadow 0.4s;
            }

            #progress-bar.countdown-phase {
                background: var(--accent2);
                box-shadow: 0 0 8px var(--accent2);
            }

            #direction-badge {
                font-size: 12px;
                letter-spacing: 3px;
                color: #b0b0d0;
                text-transform: uppercase;
                margin-bottom: 24px;
            }

            #controls {
                display: flex;
                gap: 10px;
                margin-top: 4px;
            }

            .btn {
                font-weight: 500;
                font-size: 12px;
                letter-spacing: 3px;
                text-transform: uppercase;
                padding: 8px 20px;
                background: transparent;
                color: var(--accent);
                border: 1px solid var(--accent);
                border-radius: 2px;
                cursor: pointer;
                transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            }

            .btn:hover {
                background: var(--accent);
                color: var(--bg);
                box-shadow: var(--glow);
            }

            .btn.secondary {
                color: var(--muted);
                border-color: var(--muted);
            }

            .btn.secondary:hover {
                background: var(--muted);
                color: var(--bg);
                box-shadow: none;
            }

            /* Scan line overlay */
            #timer-shell .scanlines {
                pointer-events: none;
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(0deg,
                        transparent,
                        transparent 2px,
                        rgba(0, 0, 0, 0.08) 2px,
                        rgba(0, 0, 0, 0.08) 4px);
                border-radius: 4px;
                z-index: 10;
            }

            /* Edit modal */
            #edit-modal-backdrop {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.72);
                align-items: center;
                justify-content: center;
                z-index: 100;
            }

            #edit-modal-backdrop.open {
                display: flex;
            }

            #edit-modal {
                position: relative;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 32px 28px 24px;
                width: 300px;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            #edit-modal::before,
            #edit-modal::after {
                content: '';
                position: absolute;
                width: 12px;
                height: 12px;
                border-color: var(--accent);
                border-style: solid;
            }

            #edit-modal::before {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px;
            }

            #edit-modal::after {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0;
            }

            #edit-modal h2 {
                font-weight: 300;
                font-size: 13px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: #b0b0d0;
                margin: 0;
            }

            .field {
                display: flex;
                flex-direction: column;
                gap: 6px;
            }

            .field label {
                font-size: 13px;
                letter-spacing: 3px;
                text-transform: uppercase;
                color: #b0b0d0;
            }

            .field input {
                font-family: 'Share Tech Mono', monospace;
                font-size: 22px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 2px;
                color: var(--text);
                padding: 8px 12px;
                outline: none;
                width: 100%;
                transition: border-color 0.2s, box-shadow 0.2s;
            }

            .field input:focus {
                border-color: var(--accent);
                box-shadow: var(--glow);
            }

            .field .hint {
                font-size: 11px;
                letter-spacing: 1px;
                color: #b0b0d0;
                opacity: 0.8;
            }

            .modal-row {
                display: flex;
                gap: 10px;
                justify-content: flex-end;
            }

            .field-row {
                display: flex;
                gap: 12px;
            }

            .field-row .field {
                flex: 1;
            }
        </style>
    </head>

    <body>
        <!-- Edit modal -->
        <div id="edit-modal-backdrop">
            <div id="edit-modal">
                <h2>Timer Settings</h2>
                <div class="field">
                    <label>Duration</label>
                    <input type="text" id="input-duration" placeholder="MM:SS or seconds" autocomplete="off"
                        spellcheck="false">
                    <span class="hint">e.g. 5:00 &nbsp;or&nbsp; 300</span>
                </div>
                <div class="field">
                    <label>Autostart countdown</label>
                    <input type="text" id="input-autostart" placeholder="seconds  (0 = off)" autocomplete="off"
                        spellcheck="false">
                    <span class="hint">Seconds before timer starts automatically. 0 = off</span>
                </div>
                <div class="modal-row">
                    <button class="btn secondary" id="btn-modal-cancel">Cancel</button>
                    <button class="btn" id="btn-modal-save">Apply</button>
                </div>
            </div>
        </div>

        <div id="timer-shell">
            <div class="scanlines"></div>
            <div id="label">Initializing</div>
            <div id="display">--:--</div>
            <div id="progress-bar-wrap">
                <div id="progress-bar"></div>
            </div>
            <div id="direction-badge"></div>
            <div id="controls">
                <button class="btn" id="btn-start">Start</button>
                <button class="btn secondary" id="btn-reset">Reset</button>
                <button class="btn secondary" id="btn-edit">Edit</button>
            </div>
        </div>

        <script>
            (function () {
                // ─── Read URL params ───────────────────────────────────────────────────────
                const params = new URLSearchParams(window.location.search);
                const direction = (params.get('direction') || 'down').toLowerCase(); // 'up' | 'down'
                let duration = Math.max(1, parseInt(params.get('duration') || '60', 10)); // seconds
                let autostart = parseInt(params.get('autostart') || '0', 10);              // seconds; 0 = off
                let soundEnabled = params.get('sound') === '1';                            // false by default; ?sound=1 enables

                // ─── State ────────────────────────────────────────────────────────────────
                let phase = 'idle';   // 'idle' | 'countdown' | 'running' | 'done'
                let paused = false;
                let elapsed = 0;        // ms
                let cdElapsed = 0;        // ms for countdown phase
                let lastTick = null;
                let rafId = null;
                let lastBeepSec = null; // deduplication: last integer second that triggered a beep
                let autoStarted = false; // true when started via autostart param — sound is suppressed

                // ─── Audio ────────────────────────────────────────────────────────────────
                // Sound is only played when the timer is started manually (user gesture).
                // Autostart via URL param suppresses all beeps because browsers block audio
                // on page load without a prior user interaction.
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                function beep(freq = 800, durationMs = 400, volume = 0.6) {
                    if (!soundEnabled || autoStarted) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                    // Soft fade-out to avoid click artefacts
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + durationMs / 1000);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + durationMs / 1000);
                }

                // Beep once per unique integer-second value in the given window.
                function beepIfNew(sec, min = 1, max = 3) {
                    if (sec >= min && sec <= max && sec !== lastBeepSec) {
                        lastBeepSec = sec;
                        beep();
                    }
                }

                // ─── DOM refs ─────────────────────────────────────────────────────────────
                const display = document.getElementById('display');
                const label = document.getElementById('label');
                const progressBar = document.getElementById('progress-bar');
                const dirBadge = document.getElementById('direction-badge');
                const btnStart = document.getElementById('btn-start');
                const btnReset = document.getElementById('btn-reset');
                const btnEdit = document.getElementById('btn-edit');
                const modalBackdrop = document.getElementById('edit-modal-backdrop');
                const inputDuration = document.getElementById('input-duration');
                const inputAutostart = document.getElementById('input-autostart');
                const btnModalCancel = document.getElementById('btn-modal-cancel');
                const btnModalSave = document.getElementById('btn-modal-save');

                dirBadge.textContent = direction === 'up' ? '▲  count up' : '▼  count down';

                // ─── Helpers ──────────────────────────────────────────────────────────────
                function fmt(totalSeconds) {
                    totalSeconds = Math.max(0, Math.round(totalSeconds));
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
                    return `${pad(m)}:${pad(s)}`;
                }
                function pad(n) {return String(n).padStart(2, '0');}

                function setPhaseClass(el, p) {
                    el.classList.remove('countdown-phase', 'running-phase', 'done-phase');
                    if (p) el.classList.add(`${p}-phase`);
                }

                function setAllPhaseClasses(p) {
                    setPhaseClass(display, p);
                    setPhaseClass(label, p);
                    setPhaseClass(progressBar, p);
                }

                function resetState() {
                    stopLoop();
                    phase = 'idle'; elapsed = 0; cdElapsed = 0; paused = false; lastBeepSec = null; autoStarted = false;
                }

                function render() {
                    if (phase === 'idle') {
                        display.textContent = fmt(direction === 'down' ? duration : 0);
                        label.textContent = 'Ready';
                        progressBar.style.width = direction === 'down' ? '100%' : '0%';
                        setAllPhaseClasses('');
                        btnStart.textContent = 'Start';
                    } else if (phase === 'countdown') {
                        const remaining = Math.max(0, (autostart * 1000 - cdElapsed) / 1000);
                        display.textContent = fmt(remaining);
                        label.textContent = 'Starting in';
                        progressBar.style.width = ((autostart * 1000 - cdElapsed) / (autostart * 1000) * 100).toFixed(2) + '%';
                        setAllPhaseClasses('countdown');
                        btnStart.textContent = paused ? 'Resume' : 'Pause';
                    } else if (phase === 'running') {
                        const elapsedSecs = elapsed / 1000;
                        const timerDisplay = direction === 'down'
                            ? Math.max(0, duration - elapsedSecs)
                            : elapsedSecs;
                        display.textContent = fmt(timerDisplay);
                        label.textContent = direction === 'up' ? 'Elapsed' : 'Remaining';
                        const pct = Math.min(100, (elapsed / (duration * 1000)) * 100);
                        progressBar.style.width = (direction === 'down' ? 100 - pct : pct).toFixed(2) + '%';
                        setAllPhaseClasses('running');
                        const isLastSeconds = direction === 'down' && (duration - elapsed / 1000) <= 3;
                        display.classList.toggle('last-seconds', isLastSeconds);
                        btnStart.textContent = paused ? 'Resume' : 'Pause';
                    } else if (phase === 'done') {
                        display.textContent = direction === 'down' ? fmt(0) : fmt(duration);
                        label.textContent = 'Done';
                        progressBar.style.width = direction === 'down' ? '0%' : '100%';
                        setPhaseClass(display, 'done');
                        setPhaseClass(label, 'running');
                        setPhaseClass(progressBar, 'running');
                        btnStart.textContent = 'Restart';
                    }
                }

                // ─── Tick ─────────────────────────────────────────────────────────────────
                function tick(ts) {
                    if (lastTick !== null) {
                        const delta = ts - lastTick;
                        if (phase === 'countdown') {
                            cdElapsed += delta;

                            // Beep on 3, 2, 1 of the autostart countdown
                            beepIfNew(Math.ceil((autostart * 1000 - cdElapsed) / 1000));

                            if (cdElapsed >= autostart * 1000) {
                                cdElapsed = autostart * 1000;
                                phase = 'running';
                                lastBeepSec = null;
                                beep(1100, 800, 0.9); // GO beep
                            }
                        } else if (phase === 'running') {
                            elapsed += delta;

                            if (elapsed >= duration * 1000) {
                                elapsed = duration * 1000;
                                phase = 'done';
                                beep(1100, 800, 0.9); // final "done" beep
                                cancelAnimationFrame(rafId);
                                rafId = null;
                                lastTick = null;
                                render();
                                return;
                            }
                        }
                    }
                    lastTick = ts;
                    render();
                    rafId = requestAnimationFrame(tick);
                }

                function startLoop() {
                    if (rafId) return;
                    lastTick = null;
                    rafId = requestAnimationFrame(tick);
                }

                function stopLoop() {
                    if (rafId) {cancelAnimationFrame(rafId); rafId = null;}
                    lastTick = null;
                }

                // ─── Controls ─────────────────────────────────────────────────────────────
                btnStart.addEventListener('click', () => {
                    if (phase === 'idle' || phase === 'done') {
                        resetState();
                        phase = autostart > 0 ? 'countdown' : 'running';
                        if (autostart === 0) beep(1100, 800, 0.9); // GO beep when no countdown
                        startLoop();
                    } else if (!paused && (phase === 'countdown' || phase === 'running')) {
                        // Pause
                        stopLoop();
                        paused = true;
                        render();
                    } else if (paused) {
                        // Resume
                        paused = false;
                        startLoop();
                    }
                });

                btnReset.addEventListener('click', () => {
                    resetState();
                    render();
                });

                // ─── Edit modal ───────────────────────────────────────────────────────────
                function parseDurationInput(val) {
                    val = val.trim();
                    // Accept MM:SS or HH:MM:SS
                    const colonMatch = val.match(/^(\d+):(\d{1,2})(?::(\d{1,2}))?$/);
                    if (colonMatch) {
                        const a = parseInt(colonMatch[1], 10);
                        const b = parseInt(colonMatch[2], 10);
                        const c = colonMatch[3] !== undefined ? parseInt(colonMatch[3], 10) : null;
                        if (c !== null) return a * 3600 + b * 60 + c; // HH:MM:SS
                        return a * 60 + b;                             // MM:SS
                    }
                    const n = parseInt(val, 10);
                    return isNaN(n) ? null : n;
                }

                btnEdit.addEventListener('click', () => {
                    inputDuration.value = fmt(duration);
                    inputAutostart.value = autostart > 0 ? String(autostart) : '0';
                    modalBackdrop.classList.add('open');
                    inputDuration.focus();
                    inputDuration.select();
                });

                function closeModal() {
                    modalBackdrop.classList.remove('open');
                }

                btnModalCancel.addEventListener('click', closeModal);

                modalBackdrop.addEventListener('click', (e) => {
                    if (e.target === modalBackdrop) closeModal();
                });

                btnModalSave.addEventListener('click', () => {
                    const newDuration = parseDurationInput(inputDuration.value);
                    const newAutostart = parseInt(inputAutostart.value.trim(), 10);

                    if (newDuration === null || newDuration < 1) {
                        inputDuration.style.borderColor = 'var(--accent2)';
                        inputDuration.focus();
                        return;
                    }
                    inputDuration.style.borderColor = '';

                    duration = newDuration;
                    autostart = isNaN(newAutostart) || newAutostart < 0 ? 0 : newAutostart;

                    // Reflect in URL without reloading
                    const url = new URL(window.location.href);
                    url.searchParams.set('duration', duration);
                    url.searchParams.set('autostart', autostart);
                    url.searchParams.set('sound', soundEnabled ? '1' : '0');
                    window.history.replaceState(null, '', url.toString());

                    // Reset timer to idle with new values
                    resetState();
                    closeModal();
                    render();
                });

                // ─── Per-key input validation ─────────────────────────────────────────────
                const NAV_KEYS = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Tab'];

                // Returns true (and handles the event) when a key is a shared control key.
                // Returns false when the caller should continue with its own validation.
                function handleModalKey(e) {
                    if (e.key === 'Enter') {btnModalSave.click(); return true;}
                    if (e.key === 'Escape') {closeModal(); return true;}
                    if (e.metaKey || e.ctrlKey) return true;
                    if (NAV_KEYS.includes(e.key)) return true;
                    return false;
                }

                // Helper: simulate the resulting value after inserting e.key at the cursor.
                function previewValue(e) {
                    const el = e.target;
                    return el.value.slice(0, el.selectionStart) + e.key + el.value.slice(el.selectionEnd);
                }

                // Duration: digits and colons only, at most two colons, each segment ≤ 2 digits
                inputDuration.addEventListener('keydown', (e) => {
                    if (handleModalKey(e)) return;

                    if (!/^[0-9:]$/.test(e.key)) {e.preventDefault(); return;}

                    const next = previewValue(e);

                    // At most two colons (HH:MM:SS)
                    if ((next.match(/:/g) || []).length > 2) {e.preventDefault(); return;}

                    // No consecutive colons, no leading colon
                    if (/::/.test(next) || next.startsWith(':')) {e.preventDefault(); return;}

                    // Each colon-separated segment must be at most 2 digits
                    if (next.split(':').some(s => s.length > 2)) {e.preventDefault(); return;}
                });

                // Autostart: non-negative integers only, no leading zeros
                inputAutostart.addEventListener('keydown', (e) => {
                    if (handleModalKey(e)) return;

                    if (!/^[0-9]$/.test(e.key)) {e.preventDefault(); return;}

                    // Disallow a leading zero followed by more digits (e.g. "07")
                    if (/^0\d/.test(previewValue(e))) {e.preventDefault(); return;}
                });

                // ─── Autostart ────────────────────────────────────────────────────────────
                if (autostart > 0) {
                    resetState();
                    autoStarted = true;
                    render();
                    setTimeout(() => {
                        phase = 'countdown';
                        startLoop();
                    }, 100);
                } else {
                    render();
                }
            })();
        </script>
    </body>

</html>
