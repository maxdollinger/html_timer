<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Timer</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500&display=swap');

            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            :root {
                --bg: #0a0a0f;
                --panel: #10101a;
                --border: #1e1e2e;
                --accent: #00e5ff;
                --accent2: #ff4081;
                --text: #e0e0f0;
                --muted: #444466;
                --glow: 0 0 18px rgba(0, 229, 255, 0.35);
                --glow2: 0 0 18px rgba(255, 64, 129, 0.35);
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Rajdhani', sans-serif;
                overflow: hidden;
            }

            #timer-shell {
                position: relative;
                width: 320px;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 36px 32px 28px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0;
            }

            /* Corner accents */
            #timer-shell::before,
            #timer-shell::after {
                content: '';
                position: absolute;
                width: 16px;
                height: 16px;
                border-color: var(--accent);
                border-style: solid;
            }

            #timer-shell::before {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px;
            }

            #timer-shell::after {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0;
            }

            #label {
                font-family: 'Rajdhani', sans-serif;
                font-weight: 300;
                font-size: 11px;
                letter-spacing: 4px;
                text-transform: uppercase;
                color: var(--muted);
                margin-bottom: 20px;
                transition: color 0.4s;
            }

            #label.countdown-phase {
                color: var(--accent2);
            }

            #label.running-phase {
                color: var(--accent);
            }

            #display {
                font-family: 'Share Tech Mono', monospace;
                font-size: 64px;
                color: var(--text);
                letter-spacing: 2px;
                line-height: 1;
                margin-bottom: 8px;
                transition: color 0.4s, text-shadow 0.4s;
            }

            #display.countdown-phase {
                color: var(--accent2);
                text-shadow: var(--glow2);
            }

            #display.running-phase {
                color: var(--accent);
                text-shadow: var(--glow);
            }

            #display.done-phase {
                color: #ffffff;
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
                animation: pulse-done 1s ease-in-out infinite;
            }

            @keyframes pulse-done {

                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0.6;
                }
            }

            #progress-bar-wrap {
                width: 100%;
                height: 2px;
                background: var(--border);
                margin: 20px 0 8px;
                position: relative;
                overflow: hidden;
            }

            #progress-bar {
                height: 100%;
                width: 0%;
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
                transition: background 0.4s, box-shadow 0.4s;
            }

            #progress-bar.countdown-phase {
                background: var(--accent2);
                box-shadow: 0 0 8px var(--accent2);
            }

            #direction-badge {
                font-size: 10px;
                letter-spacing: 3px;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 24px;
            }

            #controls {
                display: flex;
                gap: 10px;
                margin-top: 4px;
            }

            .btn {
                font-family: 'Rajdhani', sans-serif;
                font-weight: 500;
                font-size: 12px;
                letter-spacing: 3px;
                text-transform: uppercase;
                padding: 8px 20px;
                background: transparent;
                color: var(--accent);
                border: 1px solid var(--accent);
                border-radius: 2px;
                cursor: pointer;
                transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            }

            .btn:hover {
                background: var(--accent);
                color: var(--bg);
                box-shadow: var(--glow);
            }

            .btn.secondary {
                color: var(--muted);
                border-color: var(--muted);
            }

            .btn.secondary:hover {
                background: var(--muted);
                color: var(--bg);
                box-shadow: none;
            }

            /* Scan line overlay */
            #timer-shell .scanlines {
                pointer-events: none;
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(0deg,
                        transparent,
                        transparent 2px,
                        rgba(0, 0, 0, 0.08) 2px,
                        rgba(0, 0, 0, 0.08) 4px);
                border-radius: 4px;
                z-index: 10;
            }
        </style>
    </head>

    <body>
        <div id="timer-shell">
            <div class="scanlines"></div>
            <div id="label">Initializing</div>
            <div id="display">--:--</div>
            <div id="progress-bar-wrap">
                <div id="progress-bar"></div>
            </div>
            <div id="direction-badge" id="dir-label"></div>
            <div id="controls">
                <button class="btn" id="btn-start">Start</button>
                <button class="btn secondary" id="btn-reset">Reset</button>
            </div>
        </div>

        <script>
            (function () {
                // ─── Read URL params ───────────────────────────────────────────────────────
                const params = new URLSearchParams(window.location.search);
                const direction = (params.get('direction') || 'down').toLowerCase(); // 'up' | 'down'
                const duration = Math.max(1, parseInt(params.get('duration') || '60', 10)); // seconds
                const autostart = parseInt(params.get('autostart') || '0', 10);              // seconds; 0 = off

                // ─── State ────────────────────────────────────────────────────────────────
                let phase = 'idle';   // 'idle' | 'countdown' | 'running' | 'done'
                let elapsed = 0;        // ms
                let cdElapsed = 0;        // ms for countdown phase
                let lastTick = null;
                let rafId = null;

                // ─── DOM refs ─────────────────────────────────────────────────────────────
                const display = document.getElementById('display');
                const label = document.getElementById('label');
                const progressBar = document.getElementById('progress-bar');
                const dirBadge = document.getElementById('direction-badge');
                const btnStart = document.getElementById('btn-start');
                const btnReset = document.getElementById('btn-reset');

                dirBadge.textContent = direction === 'up' ? '▲  count up' : '▼  count down';

                // ─── Helpers ──────────────────────────────────────────────────────────────
                function fmt(totalSeconds) {
                    totalSeconds = Math.max(0, Math.round(totalSeconds));
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
                    return `${pad(m)}:${pad(s)}`;
                }
                function pad(n) {return String(n).padStart(2, '0');}

                function setPhaseClass(el, p) {
                    el.classList.remove('countdown-phase', 'running-phase', 'done-phase');
                    if (p === 'countdown') el.classList.add('countdown-phase');
                    if (p === 'running') el.classList.add('running-phase');
                    if (p === 'done') el.classList.add('done-phase');
                }

                function render() {
                    if (phase === 'idle') {
                        const initSecs = direction === 'down' ? duration : 0;
                        display.textContent = fmt(initSecs);
                        label.textContent = 'Ready';
                        progressBar.style.width = direction === 'down' ? '100%' : '0%';
                        progressBar.style.background = '';
                        setPhaseClass(display, '');
                        setPhaseClass(label, '');
                        setPhaseClass(progressBar, '');
                        btnStart.textContent = 'Start';
                    } else if (phase === 'countdown') {
                        const remaining = Math.max(0, (autostart * 1000 - cdElapsed) / 1000);
                        display.textContent = fmt(remaining);
                        label.textContent = 'Starting in';
                        progressBar.style.width = ((autostart * 1000 - cdElapsed) / (autostart * 1000) * 100).toFixed(2) + '%';
                        setPhaseClass(display, 'countdown');
                        setPhaseClass(label, 'countdown');
                        setPhaseClass(progressBar, 'countdown');
                        btnStart.textContent = 'Pause';
                    } else if (phase === 'running') {
                        const elapsedSecs = elapsed / 1000;
                        const timerDisplay = direction === 'down'
                            ? Math.max(0, duration - elapsedSecs)
                            : elapsedSecs;
                        display.textContent = fmt(timerDisplay);
                        label.textContent = direction === 'up' ? 'Elapsed' : 'Remaining';
                        const pct = Math.min(100, (elapsed / (duration * 1000)) * 100);
                        progressBar.style.width = (direction === 'down' ? 100 - pct : pct).toFixed(2) + '%';
                        setPhaseClass(display, 'running');
                        setPhaseClass(label, 'running');
                        setPhaseClass(progressBar, 'running');
                        btnStart.textContent = 'Pause';
                    } else if (phase === 'done') {
                        display.textContent = direction === 'down' ? fmt(0) : fmt(duration);
                        label.textContent = 'Done';
                        progressBar.style.width = direction === 'down' ? '0%' : '100%';
                        setPhaseClass(display, 'done');
                        setPhaseClass(label, 'running');
                        setPhaseClass(progressBar, 'running');
                        btnStart.textContent = 'Restart';
                    }
                }

                // ─── Tick ─────────────────────────────────────────────────────────────────
                function tick(ts) {
                    if (lastTick !== null) {
                        const delta = ts - lastTick;
                        if (phase === 'countdown') {
                            cdElapsed += delta;
                            if (cdElapsed >= autostart * 1000) {
                                cdElapsed = autostart * 1000;
                                phase = 'running';
                            }
                        } else if (phase === 'running') {
                            elapsed += delta;
                            if (elapsed >= duration * 1000) {
                                elapsed = duration * 1000;
                                phase = 'done';
                                cancelAnimationFrame(rafId);
                                rafId = null;
                                lastTick = null;
                                render();
                                return;
                            }
                        }
                    }
                    lastTick = ts;
                    render();
                    rafId = requestAnimationFrame(tick);
                }

                function startLoop() {
                    if (rafId) return;
                    lastTick = null;
                    rafId = requestAnimationFrame(tick);
                }

                function stopLoop() {
                    if (rafId) {cancelAnimationFrame(rafId); rafId = null;}
                    lastTick = null;
                }

                // ─── Controls ─────────────────────────────────────────────────────────────
                btnStart.addEventListener('click', () => {
                    if (phase === 'idle' || phase === 'done') {
                        elapsed = 0; cdElapsed = 0;
                        phase = autostart > 0 ? 'countdown' : 'running';
                        startLoop();
                    } else if (phase === 'countdown' || phase === 'running') {
                        // Pause
                        stopLoop();
                        phase = phase === 'countdown' ? '_paused_cd' : '_paused_run';
                        btnStart.textContent = 'Resume';
                        render();
                    } else if (phase === '_paused_cd') {
                        phase = 'countdown';
                        startLoop();
                    } else if (phase === '_paused_run') {
                        phase = 'running';
                        startLoop();
                    }
                });

                btnReset.addEventListener('click', () => {
                    stopLoop();
                    phase = 'idle'; elapsed = 0; cdElapsed = 0;
                    render();
                });

                // ─── Autostart ────────────────────────────────────────────────────────────
                if (autostart > 0) {
                    // Show ready state briefly then auto-kick
                    render();
                    setTimeout(() => {
                        phase = 'countdown';
                        startLoop();
                    }, 100);
                } else {
                    render();
                }
            })();
        </script>
    </body>

</html>
