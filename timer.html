<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Timer</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500&display=swap');

            :root {
                --bg: #0a0a0a;
                --panel: #101010;
                --border: #1e1e1e;
                --accent: #f49900;
                --accent2: #e53935;
                --text: #e0e0e0;
                --muted: #666666;
                --glow: 0 0 18px rgba(244, 153, 0, 0.35);
                --glow2: 0 0 18px rgba(229, 57, 53, 0.35);
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: var(--bg);
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: 'Rajdhani', sans-serif;
                overflow: hidden;
            }

            #timer-shell {
                min-width: 300px;
                min-height: 150px;
                position: relative;
                width: fit-content;
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 4px;
                padding: 10px 10px 10px;
                display: flex;
                flex-direction: column;
                align-items: center;
                align-content: center;
                justify-content: center;
                gap: 24px;
            }

            #timer-main {
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            #timer-main[hidden],
            #controls[hidden] {
                display: none;
            }

            /* Corner accents */
            #timer-shell::before,
            #timer-shell::after {
                content: '';
                position: absolute;
                width: 16px;
                height: 16px;
                border-color: var(--accent);
                border-style: solid;
            }

            #timer-shell::before {
                top: -1px;
                left: -1px;
                border-width: 2px 0 0 2px;
            }

            #timer-shell::after {
                bottom: -1px;
                right: -1px;
                border-width: 0 2px 2px 0;
            }

            #display {
                font-family: 'Share Tech Mono', monospace;
                font-size: 64px;
                color: var(--text);
                letter-spacing: 2px;
                line-height: 1;
                transition: color 0.4s, text-shadow 0.4s;
                -webkit-user-select: none;
                user-select: none;
            }

            #display.countdown-phase {
                color: var(--accent2);
                text-shadow: var(--glow2);
            }

            #display.running-phase {
                color: var(--accent);
                text-shadow: var(--glow);
            }

            #display.running-phase.last-seconds {
                color: var(--accent2);
                text-shadow: var(--glow2);
            }

            #display.done-phase {
                color: #ffffff;
                text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
                animation: pulse-done 1s ease-in-out infinite;
            }

            @keyframes pulse-done {

                0%,
                100% {
                    opacity: 1;
                }

                50% {
                    opacity: 0.6;
                }
            }

            #progress-bar-wrap {
                width: 100%;
                height: 2px;
                background: var(--border);
                margin: 2px;
                position: relative;
                overflow: hidden;
            }

            #progress-bar {
                height: 100%;
                width: 0%;
                background: var(--accent);
                box-shadow: 0 0 8px var(--accent);
                transition: background 0.4s, box-shadow 0.4s;
            }

            #progress-bar.countdown-phase,
            #progress-bar.running-phase.last-seconds {
                background: var(--accent2);
                box-shadow: 0 0 8px var(--accent2);
            }

            #direction-badge {
                font-size: 12px;
                letter-spacing: 3px;
                color: #b0b0b0;
                text-transform: uppercase;
                padding: 2px;
            }

            #controls {
                display: flex;
                gap: 10px;
            }

            .btn {
                font-weight: 500;
                font-size: 12px;
                letter-spacing: 3px;
                text-transform: uppercase;
                padding: 8px 20px;
                background: transparent;
                color: var(--accent);
                border: 1px solid var(--accent);
                border-radius: 2px;
                cursor: pointer;
                transition: background 0.2s, color 0.2s, box-shadow 0.2s;
            }

            .btn:hover {
                background: var(--accent);
                color: var(--bg);
                box-shadow: var(--glow);
            }

            .btn.secondary {
                color: var(--muted);
                border-color: var(--muted);
            }

            .btn.secondary:hover {
                background: var(--muted);
                color: var(--bg);
                box-shadow: none;
            }

            /* Scan line overlay */
            #timer-shell .scanlines {
                pointer-events: none;
                position: absolute;
                inset: 0;
                background: repeating-linear-gradient(0deg,
                        transparent,
                        transparent 2px,
                        rgba(0, 0, 0, 0.08) 2px,
                        rgba(0, 0, 0, 0.08) 4px);
                border-radius: 4px;
                z-index: 10;
            }

            /* Inline edit row */
            #edit-row {
                display: none;
                flex-direction: column;
                gap: 8px;
            }

            #edit-row:not([hidden]) {
                display: flex;
            }

            #edit-row-inputs {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            #edit-row-inputs .input-group {
                display: flex;
                align-items: center;
                gap: 8px;
            }

            #edit-row-inputs label {
                font-family: 'Rajdhani', sans-serif;
                font-size: 14px;
                font-weight: 500;
                color: var(--muted);
                letter-spacing: 1px;
                text-transform: uppercase;
                white-space: nowrap;
                min-width: 80px;
                text-align: right;
            }

            #edit-row-inputs input {
                font-family: 'Share Tech Mono', monospace;
                font-size: 18px;
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 2px;
                color: var(--text);
                padding: 7px 10px;
                outline: none;
                width: 12ch;
                min-width: 0;
                transition: border-color 0.2s, box-shadow 0.2s;
                letter-spacing: 1px;
            }

            #edit-row-inputs input:focus {
                border-color: var(--accent);
                box-shadow: var(--glow);
            }

            #edit-row-actions {
                display: flex;
                gap: 8px;
                justify-content: center;
            }
        </style>
    </head>

    <body>
        <div id="timer-shell">
            <div class="scanlines"></div>
            <div id="timer-main">
                <div id="display">--:--</div>
                <div id="progress-bar-wrap">
                    <div id="progress-bar"></div>
                </div>
                <div id="direction-badge"></div>
            </div>
            <div id="controls">
                <button class="btn" id="btn-start">Start</button>
                <button class="btn secondary" id="btn-reset">Reset</button>
                <button class="btn secondary" id="btn-edit">Edit</button>
            </div>
            <div id="edit-row" hidden>
                <div id="edit-row-inputs">
                    <div class="input-group">
                        <label for="input-duration">Duration</label>
                        <input type="text" id="input-duration" placeholder="MM:SS or s" autocomplete="off"
                            spellcheck="false">
                    </div>
                    <div class="input-group">
                        <label for="input-countdown">Countdown</label>
                        <input type="text" id="input-countdown" placeholder="0 = none" autocomplete="off"
                            spellcheck="false">
                    </div>
                </div>
                <div id="edit-row-actions">
                    <button class="btn secondary" id="btn-edit-cancel">✕</button>
                    <button class="btn" id="btn-edit-save">✓</button>
                </div>
            </div>
        </div>

        <script>
            (function () {
                // ─── URL params ───────────────────────────────────────────────────────────
                const params = new URLSearchParams(window.location.search);
                const direction = (params.get('direction') || 'down').toLowerCase(); // 'up' | 'down'
                let duration = Math.max(1, parseInt(params.get('duration') || '60', 10)); // seconds
                let countdown = Math.max(0, parseInt(params.get('countdown') || '0', 10)); // seconds; 0 = no pre-timer countdown
                const autostart = params.get('autostart') === '1';                          // true = start on load
                const soundEnabled = params.get('sound') === '1';                           // true = beeps on manual start

                // ─── State ────────────────────────────────────────────────────────────────
                let phase = 'idle';      // 'idle' | 'countdown' | 'running' | 'done'
                let paused = false;
                let elapsed = 0;         // ms — main timer
                let cdElapsed = 0;       // ms — pre-timer countdown
                let lastTick = null;
                let rafId = null;
                let lastBeepSec = null;  // dedup: last integer second that triggered a beep
                let autoStarted = false; // true when started via autostart param — sound suppressed

                // ─── Audio ────────────────────────────────────────────────────────────────
                // Autostart suppresses all beeps: browsers block audio on page load without
                // a prior user interaction.
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                function beep(freq = 800, ms = 400, volume = 0.6) {
                    if (!soundEnabled || autoStarted) return;
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                    // Soft fade-out to avoid click artefacts
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + ms / 1000);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + ms / 1000);
                }

                function beepGo() {beep(1100, 800, 0.9);}

                // Beep once per unique integer-second value in [min, max].
                function beepIfNew(sec, min = 1, max = 3) {
                    if (sec >= min && sec <= max && sec !== lastBeepSec) {
                        lastBeepSec = sec;
                        beep();
                    }
                }

                // ─── DOM refs ─────────────────────────────────────────────────────────────
                const display = document.getElementById('display');
                const progressBar = document.getElementById('progress-bar');
                const dirBadge = document.getElementById('direction-badge');
                const btnStart = document.getElementById('btn-start');
                const btnReset = document.getElementById('btn-reset');
                const btnEdit = document.getElementById('btn-edit');
                const timerMain = document.getElementById('timer-main');
                const controls = document.getElementById('controls');
                const editRow = document.getElementById('edit-row');
                const inputDuration = document.getElementById('input-duration');
                const inputCountdown = document.getElementById('input-countdown');
                const btnEditCancel = document.getElementById('btn-edit-cancel');
                const btnEditSave = document.getElementById('btn-edit-save');

                dirBadge.textContent = direction === 'up' ? '▲  count up' : '▼  count down';

                // ─── Helpers ──────────────────────────────────────────────────────────────
                function fmt(totalSeconds) {
                    totalSeconds = Math.max(0, Math.round(totalSeconds));
                    const h = Math.floor(totalSeconds / 3600);
                    const m = Math.floor((totalSeconds % 3600) / 60);
                    const s = totalSeconds % 60;
                    if (h > 0) return `${pad(h)}:${pad(m)}:${pad(s)}`;
                    return `${pad(m)}:${pad(s)}`;
                }
                function pad(n) {return String(n).padStart(2, '0');}

                // Returns the timer value (seconds) to display, accounting for direction.
                function timerValue() {
                    return direction === 'down'
                        ? Math.max(0, duration - elapsed / 1000)
                        : elapsed / 1000;
                }

                // Returns progress bar fill percentage, accounting for direction.
                function progressPct() {
                    const pct = Math.min(100, (elapsed / (duration * 1000)) * 100);
                    return direction === 'down' ? 100 - pct : pct;
                }

                function setPhaseClass(el, p) {
                    el.classList.remove('countdown-phase', 'running-phase', 'done-phase');
                    if (p) el.classList.add(`${p}-phase`);
                }

                function setAllPhaseClasses(p) {
                    setPhaseClass(display, p);
                    setPhaseClass(progressBar, p);
                }

                function resetState() {
                    stopLoop();
                    phase = 'idle'; elapsed = 0; cdElapsed = 0; paused = false;
                    lastBeepSec = null; autoStarted = false;
                }

                function render() {
                    if (phase === 'idle') {
                        display.textContent = fmt(timerValue());
                        progressBar.style.width = progressPct() + '%';
                        setAllPhaseClasses('');
                        btnStart.textContent = 'Start';
                    } else if (phase === 'countdown') {
                        const cdTotal = countdown * 1000;
                        const remaining = Math.max(0, (cdTotal - cdElapsed) / 1000);
                        display.textContent = fmt(remaining);
                        progressBar.style.width = ((cdTotal - cdElapsed) / cdTotal * 100).toFixed(2) + '%';
                        setAllPhaseClasses('countdown');
                        btnStart.textContent = paused ? 'Resume' : 'Pause';
                    } else if (phase === 'running') {
                        display.textContent = fmt(timerValue());
                        progressBar.style.width = progressPct().toFixed(2) + '%';
                        setAllPhaseClasses('running');
                        const isLastSeconds = direction === 'down' && timerValue() <= 3;
                        display.classList.toggle('last-seconds', isLastSeconds);
                        progressBar.classList.toggle('last-seconds', isLastSeconds);
                        btnStart.textContent = paused ? 'Resume' : 'Pause';
                    } else if (phase === 'done') {
                        display.textContent = fmt(timerValue());
                        progressBar.style.width = progressPct() + '%';
                        setPhaseClass(display, 'done');
                        setPhaseClass(progressBar, 'running');
                        btnStart.textContent = 'Restart';
                    }
                }

                // ─── Tick ─────────────────────────────────────────────────────────────────
                function tick(ts) {
                    if (lastTick !== null) {
                        const delta = ts - lastTick;
                        if (phase === 'countdown') {
                            cdElapsed += delta;
                            beepIfNew(Math.ceil((countdown * 1000 - cdElapsed) / 1000));
                            if (cdElapsed >= countdown * 1000) {
                                phase = 'running';
                                lastBeepSec = null;
                                beepGo();
                            }
                        } else if (phase === 'running') {
                            elapsed += delta;
                            if (elapsed >= duration * 1000) {
                                elapsed = duration * 1000;
                                phase = 'done';
                                beepGo();
                                stopLoop();
                                render();
                                return;
                            }
                        }
                    }
                    lastTick = ts;
                    render();
                    rafId = requestAnimationFrame(tick);
                }

                function startLoop() {
                    if (rafId) return;
                    lastTick = null;
                    rafId = requestAnimationFrame(tick);
                }

                function stopLoop() {
                    if (rafId) {cancelAnimationFrame(rafId); rafId = null;}
                    lastTick = null;
                }

                // ─── Controls ─────────────────────────────────────────────────────────────
                btnStart.addEventListener('click', () => {
                    if (phase === 'idle' || phase === 'done') {
                        resetState();
                        phase = countdown > 0 ? 'countdown' : 'running';
                        if (countdown === 0) beepGo();
                        startLoop();
                    } else if (paused) {
                        paused = false;
                        startLoop();
                    } else {
                        // Pause (phase is 'countdown' or 'running')
                        stopLoop();
                        paused = true;
                        render();
                    }
                });

                btnReset.addEventListener('click', () => {
                    resetState();
                    render();
                });

                // ─── Inline edit row ──────────────────────────────────────────────────────
                function parseDurationInput(val) {
                    val = val.trim();
                    const colonMatch = val.match(/^(\d+):(\d{1,2})(?::(\d{1,2}))?$/);
                    if (colonMatch) {
                        const a = parseInt(colonMatch[1], 10);
                        const b = parseInt(colonMatch[2], 10);
                        const c = colonMatch[3] !== undefined ? parseInt(colonMatch[3], 10) : null;
                        return c !== null ? a * 3600 + b * 60 + c : a * 60 + b;
                    }
                    const n = parseInt(val, 10);
                    return isNaN(n) ? null : n;
                }

                function openEditRow() {
                    inputDuration.value = fmt(duration);
                    inputCountdown.value = String(countdown);
                    timerMain.hidden = true;
                    controls.hidden = true;
                    editRow.hidden = false;
                    inputDuration.focus();
                    inputDuration.select();
                }

                function closeEditRow() {
                    editRow.hidden = true;
                    timerMain.hidden = false;
                    controls.hidden = false;
                }

                btnEdit.addEventListener('click', openEditRow);
                btnEditCancel.addEventListener('click', closeEditRow);

                btnEditSave.addEventListener('click', () => {
                    const newDuration = parseDurationInput(inputDuration.value);
                    if (newDuration === null || newDuration < 1) {
                        inputDuration.style.borderColor = 'var(--accent2)';
                        inputDuration.focus();
                        return;
                    }
                    inputDuration.style.borderColor = '';

                    const newCountdown = parseInt(inputCountdown.value.trim(), 10);
                    duration = newDuration;
                    countdown = isNaN(newCountdown) || newCountdown < 0 ? 0 : newCountdown;

                    const url = new URL(window.location.href);
                    url.searchParams.set('duration', duration);
                    url.searchParams.set('countdown', countdown);
                    url.searchParams.set('sound', soundEnabled ? '1' : '0');
                    window.history.replaceState(null, '', url.toString());

                    resetState();
                    closeEditRow();
                    render();
                });

                // ─── Per-key input validation ─────────────────────────────────────────────
                const NAV_KEYS = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'Home', 'End', 'Tab'];

                function handleEditKey(e) {
                    if (e.key === 'Enter') {btnEditSave.click(); return true;}
                    if (e.key === 'Escape') {closeEditRow(); return true;}
                    return e.metaKey || e.ctrlKey || NAV_KEYS.includes(e.key);
                }

                function previewValue(e) {
                    const el = e.target;
                    return el.value.slice(0, el.selectionStart) + e.key + el.value.slice(el.selectionEnd);
                }

                // Duration: digits and colons only, ≤ 2 colons, each segment ≤ 2 digits
                inputDuration.addEventListener('keydown', (e) => {
                    if (handleEditKey(e)) return;
                    if (!/^[0-9:]$/.test(e.key)) {e.preventDefault(); return;}
                    const next = previewValue(e);
                    if ((next.match(/:/g) || []).length > 2) {e.preventDefault(); return;}
                    if (/::/.test(next) || next.startsWith(':')) {e.preventDefault(); return;}
                    if (next.includes(':') && next.split(':').some(s => s.length > 2)) {e.preventDefault(); return;}
                });

                // Countdown: non-negative integer, no leading zeros
                inputCountdown.addEventListener('keydown', (e) => {
                    if (handleEditKey(e)) return;
                    if (!/^[0-9]$/.test(e.key)) {e.preventDefault(); return;}
                    if (/^0\d/.test(previewValue(e))) {e.preventDefault(); return;}
                });

                // ─── Bootstrap ────────────────────────────────────────────────────────────
                if (autostart) {
                    autoStarted = true;
                    render();
                    setTimeout(() => {
                        phase = countdown > 0 ? 'countdown' : 'running';
                        startLoop();
                    }, 100);
                } else {
                    render();
                }
            })();
        </script>
    </body>

</html>
